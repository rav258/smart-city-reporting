services:
  mysql:
    image: mysql:8.4
    container_name: smart-city-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_city_reporting
      MYSQL_USER: smartcity
      MYSQL_PASSWORD: smartcity
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: smart-city-backend
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    command: mvn -Dquarkus.analytics.disabled=true quarkus:dev -Dquarkus.http.host=0.0.0.0
    environment:
      QUARKUS_DATASOURCE_USERNAME: smartcity
      QUARKUS_DATASOURCE_PASSWORD: smartcity
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/smart_city_reporting
      QUARKUS_HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2

  frontend:
    image: node:22-alpine
    container_name: smart-city-frontend
    working_dir: /app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mysql_data:
  maven_cache:
  frontend_node_modules: